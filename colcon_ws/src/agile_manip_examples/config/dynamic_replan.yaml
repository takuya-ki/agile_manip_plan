dynamic_replan_planner:
  ros__parameters:
    grasp_service_name: "/generate_grasp"
    move_group_action_name: "cumotion/move_group"
    world_frame: "world"
    object_frame: "object"
    grasp_frame_prefix: "grasp_"
    max_grasps: 32
    max_consecutive_misses: 3
    tf_lookup_timeout_sec: 0.2
    result_collection_delay_sec: 0.5
    grasp_result_path: "/colcon_ws/src/graspgen_ros/share/grasp_result/example_mesh_antipodal.yaml"
    publish_object_identity_tf: true
    planner_group_name: "arm"
    pipeline_id: "isaac_ros_cumotion"
    planner_id: "cuMotion"
    end_effector_link: "grasp_frame"
    # Tight planning budget because we issue a fresh request several
    # times per second; cuMotion typically returns in <50 ms so the
    # action server rarely times out against this ceiling.
    allowed_planning_time: 1.0
    position_tolerance_m: 0.005
    orientation_tolerance_rad: 0.05

    selection_mode: "highest_confidence"
    selected_grasp_index: 0
    multi_criteria_weight_confidence: 0.7
    multi_criteria_weight_reach: 0.3

    # Obstacle geometry stays fixed; only the centre moves.
    obstacle_size_xyz: [0.08, 0.40, 0.50]
    obstacle_frame: "world"
    obstacle_pose_topic: "/dynamic_obstacle/pose"

    # Internal oscillator used whenever nothing publishes to
    # ``obstacle_pose_topic``. Drives a smooth sinusoidal motion along
    # the chosen axis around ``oscillator_center_xyz``.
    oscillator_center_xyz: [0.25, 0.0, 0.40]
    oscillator_axis: "y"
    oscillator_amplitude_m: 0.22
    oscillator_frequency_hz: 0.3

    replan_rate_hz: 5.0
    publish_obstacle_marker: true
