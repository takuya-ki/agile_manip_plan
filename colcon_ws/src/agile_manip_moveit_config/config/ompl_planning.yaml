# Minimal OMPL pipeline configuration so we can benchmark random-
# sampling CPU planners (RRTConnect, RRTstar, ...) against the
# cuMotion GPU pipeline using the same MoveGroup action server. This
# mirrors the default OMPL config MoveIt Setup Assistant generates
# for a 7-DOF arm; trim or extend planner_configs freely.
#
# The ``planning_pipelines.pipeline_names`` list that move_group cares
# about lives in ``isaac_ros_cumotion_planning.yaml``; this file only
# contributes the ``ompl`` section below.
ompl:
  planning_plugins:
    - ompl_interface/OMPLPlanner
  request_adapters:
    - default_planning_request_adapters/ResolveConstraintFrames
    - default_planning_request_adapters/ValidateWorkspaceBounds
    - default_planning_request_adapters/CheckStartStateBounds
    - default_planning_request_adapters/CheckStartStateCollision
  response_adapters:
    - default_planning_response_adapters/AddTimeOptimalParameterization
    - default_planning_response_adapters/ValidateSolution
    - default_planning_response_adapters/DisplayMotionPath
  start_state_max_bounds_error: 0.1

  planner_configs:
    RRTConnect:
      type: geometric::RRTConnect
      range: 0.0
    RRTstar:
      type: geometric::RRTstar
      range: 0.0
      goal_bias: 0.05
      delay_collision_checking: 1
    PRMstar:
      type: geometric::PRMstar

  arm:
    planner_configs:
      - RRTConnect
      - RRTstar
      - PRMstar
    default_planner_config: RRTConnect
    projection_evaluator: joints(iiwa_joint_1,iiwa_joint_2)
    longest_valid_segment_fraction: 0.005
