name: CI

on:
  push:
    branches: [main]

jobs:
  # Pure-Python tests that stub ROS messages so they can run on a plain
  # ubuntu-latest runner without pulling the full ROS 2 + CUDA stack.
  # Scope is intentionally narrow: planner helpers that were extracted
  # into planning_helpers.py. Expand as more host-runnable helpers appear.
  host-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pytest
        run: pip install pytest

      - name: Run host-runnable unit tests
        run: |
          python -m pytest \
            colcon_ws/src/agile_manip_examples/test/ \
            -v

  # Build the Docker image to catch Dockerfile regressions. The CUDA
  # base image is ~4 GB so this job is heavy; GitHub Actions cache is
  # used to keep subsequent runs fast.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cache tuning to keep the GHA cache small:
      #   - ``mode=min``: only final-image layers are cached, not every
      #     intermediate build stage. Cuts the cache size significantly
      #     for the CUDA-heavy base image.
      #   - ``scope`` keyed on the Dockerfile hash: when the Dockerfile
      #     changes, a fresh cache key is used; old entries stop being
      #     referenced and GHA evicts them automatically (the 10 GB
      #     per-repo LRU limit kicks in on unused entries).
      - name: Compute Dockerfile hash
        id: dfhash
        run: echo "hash=$(sha256sum docker/Dockerfile | cut -c1-12)" >> $GITHUB_OUTPUT

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: agile_manip_plan:ci
          cache-from: type=gha,scope=docker-${{ steps.dfhash.outputs.hash }}
          cache-to: type=gha,scope=docker-${{ steps.dfhash.outputs.hash }},mode=min
